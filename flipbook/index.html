<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Springboard — PHD Nigeria | Q2 '26 Edition</title>
<meta name="description" content="Springboard, the PHD Nigeria staff newsletter — Q2 2026 edition. Company news, staff spotlights, birthdays, thought-leadership articles and health tips, in an interactive flipbook.">
<meta name="theme-color" content="#241046">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<!-- Open Graph / social preview -->
<meta property="og:title" content="Springboard — PHD Nigeria, Q2 '26 Edition">
<meta property="og:description" content="An interactive flip-through of PHD Nigeria's staff newsletter.">
<meta property="og:image" content="assets/pages/page-01.webp">
<meta property="og:type" content="website">
</head>
<body>

<div class="grain" aria-hidden="true"></div>

<!-- Loading screen -->
<div id="loader">
  <div class="spring-loader" aria-hidden="true">
    <svg viewBox="0 0 64 96"><path d="M32 4 C10 4 54 18 32 22 C10 26 54 40 32 44 C10 48 54 62 32 66 C10 70 54 84 32 88"/></svg>
  </div>
  <div class="loader-title">Spring<b>board</b></div>
  <div class="loader-label">Opening Q2 '26 edition…</div>
</div>

<div class="stage">

  <!-- Top bar -->
  <header class="topbar">
    <div class="brandmark">
      <svg class="logo" viewBox="0 0 40 40" fill="none" aria-hidden="true">
        <rect width="40" height="40" rx="10" fill="#9FEA47"/>
        <path d="M10 28 C16 28 14 12 22 12" stroke="#150826" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M20 12 L30 12 L22 20 Z" fill="#150826"/>
      </svg>
      <span class="name">Springboard</span>
      <span class="edition">Q2 '26</span>
    </div>

    <div class="topbar-actions">
      <div class="search-wrap" id="searchWrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="searchInput" type="text" placeholder="Search this issue…" autocomplete="off" aria-label="Search pages">
        <div class="search-results" id="searchResults"></div>
      </div>

      <button class="icon-btn" id="btnToc" title="Table of contents (T)" aria-label="Table of contents">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
      </button>

      <button class="icon-btn" id="btnSound" title="Toggle page-turn sound (M)" aria-label="Toggle sound">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9v6h4l5 5V4L8 9H4z"/><path d="M17 8a5 5 0 010 8"/></svg>
      </button>

      <button class="icon-btn" id="btnAuto" title="Autoplay" aria-label="Toggle autoplay">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="6 4 20 12 6 20 6 4"/></svg>
      </button>

      <button class="icon-btn" id="btnFullscreen" title="Fullscreen (F)" aria-label="Toggle fullscreen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>
      </button>

      <button class="icon-btn" id="btnShare" title="Share this page" aria-label="Share this page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
      </button>

      <div style="position:relative;">
        <button class="icon-btn" id="btnSettings" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.9l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.9-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1-1.6 1.7 1.7 0 00-1.9.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.9 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1 1.7 1.7 0 00-.3-1.9l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.9.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.9-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.9V9a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/></svg>
        </button>
        <div class="pop" id="settingsPop">
          <div class="pop-row">
            <span>Reading theme</span>
            <select class="pop-select" id="themeSelect">
              <option value="dark">Stage (dark)</option>
              <option value="light">Paper (light)</option>
            </select>
          </div>
          <div class="pop-row">
            <span>Autoplay speed</span>
            <select class="pop-select" id="autoSpeed">
              <option value="3000">Fast · 3s</option>
              <option value="5000" selected>Normal · 5s</option>
              <option value="8000">Slow · 8s</option>
            </select>
          </div>
          <div class="pop-divider"></div>
          <div class="pop-row">
            <span>Reduce motion</span>
            <label class="switch"><input type="checkbox" id="motionSwitch"><span class="track"></span></label>
          </div>
          <div class="pop-divider"></div>
          <div class="pop-row"><a href="assets/latest-issue.pdf" download style="color:var(--lime); text-decoration:none; font-size:12px;">↓ Download original PDF</a></div>
        </div>
      </div>
    </div>
  </header>

  <!-- Book -->
  <main class="book-viewport">
    <div class="book" id="book">
      <div class="page-slot left" id="leftSlot">
        <img id="leftImg" alt="Previous page" loading="lazy">
        <div class="corner-hint-left" id="cornerHintLeft" aria-hidden="true">
          <svg viewBox="0 0 34 34"><path d="M34 0 L34 34 L0 34 Z" fill="rgba(21,8,38,.18)"/></svg>
        </div>
      </div>
      <div class="spine" aria-hidden="true"></div>
      <div class="page-slot right" id="rightSlot">
        <div class="leaf" id="leaf">
          <div class="face front"><img id="frontImg" alt="Current page"></div>
          <div class="face back"><img id="backImg" alt="Next page"></div>
          <div class="shade"></div>
          <div class="lift-shadow"></div>
        </div>
        <div class="corner-hint" id="cornerHintRight" aria-hidden="true">
          <svg viewBox="0 0 34 34"><path d="M34 0 L34 34 L0 34 Z" fill="rgba(21,8,38,.18)"/></svg>
        </div>
      </div>
      <div class="click-zone prev" id="zonePrev" aria-label="Previous page" role="button"></div>
      <div class="click-zone next" id="zoneNext" aria-label="Next page" role="button"></div>
    </div>
  </main>

  <!-- Bottom rail -->
  <div class="rail">
    <div class="rail-progress"><div class="rail-progress-fill" id="fillBar"></div></div>

    <div class="rail-nav">
      <button class="icon-btn plank" id="btnPrev" aria-label="Previous page" title="Previous (←)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="icon-btn plank" id="btnNext" aria-label="Next page" title="Next (→ / space)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <div class="page-count" id="pageCount"></div>
    <div class="section-chip" id="sectionChip"></div>

    <div class="filmstrip" id="filmstrip"></div>
  </div>

</div>

<!-- TOC drawer -->
<div class="drawer-backdrop" id="drawerBackdrop"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head">
    <h2>Table of Contents</h2>
    <button class="icon-btn" id="btnDrawerClose" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</aside>

<!-- Toast -->
<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
  <span id="toastMsg"></span>
</div>

<script src="js/pages-data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
