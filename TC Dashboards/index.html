<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHD Nigeria | Media Dashboard Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --purple:#38008C;
    --pink:#FF70F2;
    --lemon:#9FEA47;
    --orange:#FF7373;
    --sky:#9B83FF;
    --bg:#0A0110;
    --bg2:#12061F;
    --panel:#170A26;
    --panel2:#1D0E30;
    --border:rgba(155,131,255,0.18);
    --text:#F3EFFB;
    --text-dim:#B8AAD1;
    --text-faint:#7C6D96;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Syne','Segoe UI',system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    flex-direction:column;
    min-height:100vh;
    overflow:hidden;
  }

  /* ============ TOP BAR ============ */
  #topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
    padding:14px 28px;
    background:
      radial-gradient(circle at 15% 0%, rgba(56,0,140,0.55), transparent 55%),
      radial-gradient(circle at 90% 100%, rgba(255,112,242,0.12), transparent 50%),
      var(--panel);
    border-bottom:1px solid var(--border);
    flex-shrink:0;
    z-index:10;
  }
  #brand{
    display:flex;
    align-items:center;
    gap:12px;
  }
  #brand .mark{
    width:34px; height:34px; border-radius:9px;
    background:linear-gradient(135deg, var(--purple), var(--sky));
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:14px; letter-spacing:.02em;
    box-shadow:0 0 18px rgba(155,131,255,0.35);
    flex-shrink:0;
  }
  #brand .titles{
    display:flex; flex-direction:column; line-height:1.15;
  }
  #brand .titles .t1{
    font-weight:800; font-size:15px; letter-spacing:.01em;
  }
  #brand .titles .t2{
    font-size:11px; color:var(--text-faint); font-weight:500; letter-spacing:.03em;
  }

  #tabs{
    display:flex;
    gap:6px;
    background:var(--bg2);
    padding:5px;
    border-radius:999px;
    border:1px solid var(--border);
  }
  .tab-btn{
    display:flex; align-items:center; gap:8px;
    padding:9px 18px;
    border-radius:999px;
    border:none;
    background:transparent;
    color:var(--text-dim);
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    letter-spacing:.01em;
    cursor:pointer;
    transition:all .2s ease;
    white-space:nowrap;
  }
  .tab-btn:hover{ color:var(--text); }
  .tab-btn.active{
    background:linear-gradient(135deg, var(--purple), #5A1FB0);
    color:#fff;
    box-shadow:0 0 16px rgba(56,0,140,0.55);
  }
  .tab-btn .dot{
    width:6px; height:6px; border-radius:50%;
    background:var(--lemon);
    box-shadow:0 0 6px var(--lemon);
    flex-shrink:0;
  }
  .tab-btn.active .dot{ background:#fff; box-shadow:0 0 6px #fff; }

  #status{
    display:flex; align-items:center; gap:8px;
    font-size:11px; color:var(--text-faint); font-weight:600;
    letter-spacing:.03em;
  }
  #status .pulse{
    width:7px; height:7px; border-radius:50%;
    background:var(--lemon);
    box-shadow:0 0 8px var(--lemon);
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:.4; }
  }

  /* ============ FRAME AREA ============ */
  #frame-wrap{
    position:relative;
    flex:1;
    min-height:0;
  }
  .frame-panel{
    position:absolute;
    inset:0;
    display:none;
    flex-direction:column;
  }
  .frame-panel.active{ display:flex; }
  .frame-panel iframe{
    width:100%;
    height:100%;
    border:none;
    background:var(--bg);
  }

  /* Loading state before an iframe's first load */
  .loader{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    background:var(--bg);
    z-index:2;
  }
  .loader.hidden{ display:none; }
  .loader .spin{
    width:38px; height:38px;
    border-radius:50%;
    border:3px solid var(--border);
    border-top-color:var(--sky);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .loader .msg{
    font-size:12px;
    color:var(--text-faint);
    font-weight:600;
    letter-spacing:.03em;
  }

  @media (max-width:640px){
    #topbar{ flex-wrap:wrap; padding:12px 16px; }
    #status{ display:none; }
    .tab-btn{ padding:8px 12px; font-size:12px; }
    #brand .titles .t2{ display:none; }
  }
</style>
</head>
<body>

<div id="topbar">
  <div id="brand">
    <div class="mark">P</div>
    <div class="titles">
      <div class="t1">PHD Dashboard Suite</div>
      <div class="t2">Media Partner Spend &amp; Compliance</div>
    </div>
  </div>

  <div id="tabs">
    <button class="tab-btn active" data-target="panel-spend" id="btn-spend">
      <span class="dot"></span> Media Partner Spend Trend
    </button>
    <button class="tab-btn" data-target="panel-compliance" id="btn-compliance">
      <span class="dot"></span> Monthly Compliance Report
    </button>
  </div>

  <div id="status">
    <span class="pulse"></span> LIVE
  </div>
</div>

<div id="frame-wrap">
  <div class="frame-panel active" id="panel-spend">
    <iframe id="iframe-spend" src="spend-trend.html" title="PHD Media Partner Spend Trend Dashboard"></iframe>
  </div>
  <div class="frame-panel" id="panel-compliance">
    <div class="loader" id="loader-compliance">
      <div class="spin"></div>
      <div class="msg">LOADING COMPLIANCE REPORT…</div>
    </div>
    <iframe id="iframe-compliance" title="PHD Monthly Compliance Report" style="opacity:0;"></iframe>
  </div>
</div>

<script>
(function(){
  var buttons = document.querySelectorAll('.tab-btn');
  var panels = document.querySelectorAll('.frame-panel');
  var complianceLoaded = false;
  var complianceIframe = document.getElementById('iframe-compliance');
  var complianceLoader = document.getElementById('loader-compliance');

  complianceIframe.addEventListener('load', function(){
    complianceLoader.classList.add('hidden');
    complianceIframe.style.opacity = '1';
  });

  function activate(targetId){
    buttons.forEach(function(b){
      b.classList.toggle('active', b.dataset.target === targetId);
    });
    panels.forEach(function(p){
      p.classList.toggle('active', p.id === targetId);
    });

    if(targetId === 'panel-compliance' && !complianceLoaded){
      complianceLoaded = true;
      complianceIframe.src = 'compliance-report.html';
    }
  }

  buttons.forEach(function(b){
    b.addEventListener('click', function(){
      activate(b.dataset.target);
    });
  });

  // Optional: allow deep-linking via #compliance or #spend
  var hash = window.location.hash.replace('#','');
  if(hash === 'compliance'){
    activate('panel-compliance');
  }
})();
</script>

</body>
</html>
